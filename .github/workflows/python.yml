name: Python CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: 
      - self-hosted
      - Linux

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        pytest

    - name: Run Application
      run: |
        python app.py
